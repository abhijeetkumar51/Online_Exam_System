<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Account — ExamPro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --accent: #06b6d4;
            --dark: #0f172a;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --gradient-bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #312e81 100%);
            --gradient-primary: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-bg);
            position: relative;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12), transparent 70%);
            border-radius: 50%;
            animation: drift 18s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.12), transparent 70%);
            border-radius: 50%;
            animation: drift 22s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(30px, -25px);
            }
        }

        .register-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 1.5rem;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--gray-light);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: color 0.2s ease;
        }

        .back-home:hover {
            color: white;
        }

        .register-brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .register-brand .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--gradient-primary);
            font-size: 1.6rem;
            color: white;
            margin-bottom: 0.8rem;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.4);
        }

        .register-brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }

        .register-brand p {
            color: var(--gray-light);
            font-size: 0.9rem;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .form-label {
            color: var(--gray-light);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            color: white;
        }

        .form-control::placeholder {
            color: var(--gray);
        }

        /* File input styling */
        .form-control[type="file"] {
            padding: 10px 16px;
        }

        .form-control[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            margin-right: 12px;
            transition: background 0.2s ease;
        }

        .form-control[type="file"]::file-selector-button:hover {
            background: var(--accent);
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1rem;
            pointer-events: none;
        }

        .input-icon-wrap .form-control {
            padding-left: 42px;
        }

        .btn-register {
            width: 100%;
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
            color: white;
        }

        .register-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--gray);
            font-size: 0.8rem;
        }

        .register-divider::before,
        .register-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .register-footer {
            text-align: center;
            color: var(--gray-light);
            font-size: 0.9rem;
        }

        .register-footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .register-footer a:hover {
            color: var(--accent);
        }

        .alert-modern {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success-modern {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .alert-success-modern a {
            color: #4ade80;
            font-weight: 600;
        }

        .alert-danger-modern {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .text-danger {
            color: #fca5a5 !important;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        /* Two-column row on form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        .fade-up:nth-child(2) {
            animation-delay: 0.1s;
        }

        .fade-up:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="register-wrapper">
        <a th:href="@{/}" class="back-home fade-up">
            <i class="bi bi-arrow-left"></i> Back to home
        </a>

        <div class="register-brand fade-up">
            <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
            <h1>Create Your Account</h1>
            <p>Join ExamPro and start learning today</p>
        </div>

        <div class="register-card fade-up">
            <!-- Success Alert -->
            <div th:if="${param.success}" class="alert-modern alert-success-modern">
                <i class="bi bi-check-circle-fill"></i>
                Registration successful! You can now <a th:href="@{/login}">sign in</a>.
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
                <!-- Full Name -->
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                            placeholder="John Doe">
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="username" class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" id="username" th:field="*{username}"
                            placeholder="you@example.com" required>
                    </div>
                    <p th:if="${#fields.hasErrors('username')}" class="text-danger" th:errors="*{username}"></p>
                </div>

                <!-- Mobile & Password row -->
                <div class="form-row">
                    <div class="mb-3">
                        <label for="mobileNumber" class="form-label">Mobile Number</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-phone input-icon"></i>
                            <input type="tel" class="form-control" id="mobileNumber" th:field="*{mobileNumber}"
                                placeholder="9876543210">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-icon-wrap">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" class="form-control" id="password" th:field="*{password}"
                                placeholder="Min 6 characters" required>
                        </div>
                    </div>
                </div>

                <!-- Profile Picture -->
                <div class="mb-4">
                    <label for="profilePicFile" class="form-label">
                        <i class="bi bi-camera me-1"></i> Profile Picture
                        <span style="color: var(--gray); font-weight: 400;">(optional)</span>
                    </label>
                    <input type="file" class="form-control" id="profilePicFile" name="profilePicFile"
                        accept="image/png, image/jpeg">
                </div>

                <button type="submit" class="btn-register">
                    <i class="bi bi-rocket-takeoff me-2"></i>Create Account
                </button>
            </form>

            <div class="register-divider">or</div>

            <div class="register-footer">
                Already have an account?
                <a th:href="@{/login}">Sign in</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/password-toggle.js}"></script>
</body>

</html>
